version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: iam_user
      POSTGRES_PASSWORD: 03101812@
      POSTGRES_DB: iam
    ports:
      - "5433:5432"
    volumes:
      - iam_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6380:6379"
volumes:
  iam_pg:
